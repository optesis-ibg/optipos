<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="StationCheck Pro – Inspection & Conformité des stations-service" />

    <!-- PWA -->
    <meta name="theme-color" content="#5F3876" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StationCheck" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>StationCheck Pro — Optesis</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: #5F3876;
        font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background: #FDFAF6;
      }
      input, select, textarea, button {
        font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
      }
      .safe-top    { padding-top:    env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
